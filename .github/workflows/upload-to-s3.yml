name: Zip repository and upload to S3

on:
  push:

jobs:
  zip-and-upload:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set variables
        run: echo "REPO_NAME=${{ github.event.repository.name }}" >> $GITHUB_ENV

      - name: Create zip archive
        run: |
          zip -r ${REPO_NAME}.zip . \
            -x "*.git*" \
               "*.github*" \
               ".terraform/*"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::499497677255:role/GitHubActionsS3Upload
          aws-region: eu-west-2

      - name: Upload zip to S3
        run: |
          aws s3 cp ${REPO_NAME}.zip \
          s3://tf-upload-499497677255-eu-west-2-an/${REPO_NAME}/upload/${{ github.sha }}.zip

      - name: Create metadata file
        run: |
          cat <<EOF > metadata.json
          {
            "repo": "${{ github.repository }}",
            "commit": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}"
          }
          EOF

      - name: Upload metadata to S3
        run: |
          aws s3 cp metadata.json \
          s3://tf-upload-499497677255-eu-west-2-an/${REPO_NAME}/metadata/${{ github.sha }}.json